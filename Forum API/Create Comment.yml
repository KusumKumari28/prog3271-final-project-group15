info:
  name: Create Comment
  type: http
  seq: 10

http:
  method: POST
  url: http://localhost:3000/api/posts/{{postId}}/comments
  headers:
    - name: Authorization
      value: Bearer {{authToken}}
  body:
    type: json
    data: |-
      {
        "content": "This is a test comment"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5